<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>家計簿アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 🌟 スクロールの滑らかさと、ホームバー余白の最適化 */
    * { -webkit-overflow-scrolling: touch; }
    body { overscroll-behavior-y: none; }
    .safe-area-pb { 
      padding-bottom: max(env(safe-area-inset-bottom), 16px); 
    }
    /* スクロールバーを隠す（よりアプリらしく） */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function useLocalStorage(key, initialValue) {
      const [value, setValue] = useState(() => {
        const saved = localStorage.getItem(key);
        return saved !== null ? JSON.parse(saved) : initialValue;
      });
      useEffect(() => {
        localStorage.setItem(key, JSON.stringify(value));
      }, [key, value]);
      return [value, setValue];
    }

    const AccountIcon = ({ label, bgColor }) => (
      <div className={`w-10 h-10 flex items-center justify-center font-bold text-white rounded-sm ${bgColor}`}>{label}</div>
    );

    // ==========================================
    // 1. 資産タブ
    // ==========================================
    const AssetTab = ({ fixedCosts, expenses, currentYearMonth }) => {
      const [cashAssets, setCashAssets] = useLocalStorage('kakeibo_cash', { matsu: '', shin: '', ka: '', p: '', ic: '', w: '', gen: '' });
      const [pointAssets, setPointAssets] = useLocalStorage('kakeibo_point', { w: '', p: '', nisa: '' });

      const handleCashChange = (id, value) => setCashAssets({ ...cashAssets, [id]: value });
      const handlePointChange = (id, value) => setPointAssets({ ...pointAssets, [id]: value });

      const cashAccounts = [
        { id: 'matsu', label: '松', color: 'bg-blue-700' }, { id: 'shin', label: '新', color: 'bg-yellow-400' },
        { id: 'ka', label: 'か', color: 'bg-orange-500' }, { id: 'p', label: 'P', color: 'bg-red-600' },
        { id: 'ic', label: 'IC', color: 'bg-green-500' }, { id: 'w', label: 'W', color: 'bg-blue-400' }, { id: 'gen', label: '現', color: 'bg-gray-400' }
      ];
      const pointAccounts = [{ id: 'w', label: 'W', color: 'bg-blue-400' }, { id: 'p', label: 'P', color: 'bg-red-600' }, { id: 'nisa', label: 'NISA', color: 'bg-red-700' }];

      const cashTotal = Object.values(cashAssets).reduce((sum, val) => sum + Number(val || 0), 0);
      const pointTotal = Object.values(pointAssets).reduce((sum, val) => sum + Number(val || 0), 0);

      const getBalance = (accLabel, currentVal) => {
        const val = Number(currentVal || 0);
        const unpaidFixed = fixedCosts.filter(c => c.accountLabel === accLabel && !c.isPaid).reduce((sum, c) => sum + c.amount, 0);
        const monthlyVars = expenses.filter(e => e.accountLabel === accLabel && e.yearMonth === currentYearMonth).reduce((sum, e) => sum + e.amount, 0);
        return val - unpaidFixed - monthlyVars;
      };

      return (
        <div className="flex flex-col space-y-6 pt-4 pb-10">
          <div className="px-4">
            <div className="grid grid-cols-12 gap-2 mb-2 text-center text-sm font-bold text-gray-600"><div className="col-span-2">口座</div><div className="col-span-5">現在</div><div className="col-span-5">収支</div></div>
            <div className="space-y-3">
              {cashAccounts.map((acc) => (
                <div key={acc.id} className="grid grid-cols-12 gap-2 items-center">
                  <div className="col-span-2 flex justify-center"><AccountIcon label={acc.label} bgColor={acc.color} /></div>
                  <div className="col-span-5"><input type="number" inputMode="numeric" value={cashAssets[acc.id]} onChange={(e) => handleCashChange(acc.id, e.target.value)} className="w-full h-10 border border-gray-400 rounded-md px-2 text-right focus:outline-none focus:ring-2 focus:ring-green-500" /></div>
                  <div className="col-span-5">
                    <div className={`w-full h-10 border border-gray-400 rounded-md px-2 text-right bg-gray-50 flex items-center justify-end ${getBalance(acc.label, cashAssets[acc.id]) < 0 ? 'text-red-500 font-bold' : 'text-gray-600'}`}>
                      {getBalance(acc.label, cashAssets[acc.id]).toLocaleString()}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="bg-emerald-500 text-white px-4 py-3 flex justify-end items-center space-x-4">
            <span className="font-bold">合計</span>
            <div className="w-32 h-8 border border-white rounded-md bg-transparent flex items-center justify-end px-2 font-bold">{cashTotal.toLocaleString()}</div>
          </div>

          <div className="px-4 mt-6">
            <div className="grid grid-cols-12 gap-2 mb-2 text-center text-sm font-bold text-gray-600"><div className="col-span-2">口座</div><div className="col-span-5">現在</div><div className="col-span-5"></div></div>
            <div className="space-y-3">
              {pointAccounts.map((acc) => (
                <div key={acc.id} className="grid grid-cols-12 gap-2 items-center">
                  <div className="col-span-2 flex justify-center"><AccountIcon label={acc.label} bgColor={acc.color} /></div>
                  <div className="col-span-5"><input type="number" inputMode="numeric" value={pointAssets[acc.id]} onChange={(e) => handlePointChange(acc.id, e.target.value)} className="w-full h-10 border border-gray-400 rounded-md px-2 text-right focus:outline-none focus:ring-2 focus:ring-green-500" /></div>
                  <div className="col-span-5"></div>
                </div>
              ))}
            </div>
          </div>
          <div className="bg-emerald-500 text-white px-4 py-3 flex justify-end items-center space-x-4">
            <span className="font-bold">合計</span>
            <div className="w-32 h-8 border border-white rounded-md bg-transparent flex items-center justify-end px-2 font-bold">{pointTotal.toLocaleString()}</div>
          </div>
        </div>
      );
    };

    // ==========================================
    // 2. 固定タブ
    // ==========================================
    // 🌟 currentYearMonth を受け取り、画面上部に表示（要望4）
    const FixedTab = ({ fixedCosts, setFixedCosts, handleDeleteFixed, currentYearMonth }) => {
      const togglePaid = (id) => {
        setFixedCosts(fixedCosts.map(cost => cost.id === id ? { ...cost, isPaid: !cost.isPaid } : cost));
      };
      
      // 🌟 未払いの項目（!cost.isPaid）のみを合計するよう修正（要望7）
      const totalAmount = fixedCosts.filter(c => !c.isPaid).reduce((sum, cost) => sum + cost.amount, 0);

      return (
        <div className="flex flex-col h-full pt-2 pb-10">
          <div className="px-4 flex-1">
            {/* 🌟 変動タブと同じ月表示 */}
            <div className="text-center font-bold text-gray-600 mb-2">{currentYearMonth}</div>
            
            <div className="grid grid-cols-12 gap-1 mb-2 text-center text-sm font-bold text-gray-600"><div className="col-span-2">口座</div><div className="col-span-4">項目</div><div className="col-span-2">日付</div><div className="col-span-3">金額</div><div className="col-span-1 text-xs flex items-center justify-center">支払</div></div>
            <div className="space-y-3">
              {fixedCosts.map((cost) => (
                <div key={cost.id} className={`grid grid-cols-12 gap-1 items-center transition-opacity duration-200 ${cost.isPaid ? 'opacity-50' : 'opacity-100'}`}>
                  <div className="col-span-2 flex justify-center"><AccountIcon label={cost.accountLabel} bgColor={cost.color} /></div>
                  <div className="col-span-4 cursor-pointer" onClick={() => { if(window.confirm(`固定費「${cost.name}」を削除しますか？`)) handleDeleteFixed(cost.id); }}>
                    <div className="w-full h-10 flex items-center border border-gray-400 rounded-md px-1 text-sm bg-white overflow-hidden whitespace-nowrap active:bg-red-50">{cost.name}</div>
                  </div>
                  <div className="col-span-2"><div className="w-full h-10 flex items-center justify-center border border-gray-400 rounded-md text-sm bg-white">{cost.date}</div></div>
                  <div className="col-span-3"><div className="w-full h-10 flex items-center justify-end border border-gray-400 rounded-md px-1 text-sm bg-white">{cost.amount.toLocaleString()}</div></div>
                  <div className="col-span-1 flex justify-center"><input type="checkbox" checked={cost.isPaid} onChange={() => togglePaid(cost.id)} className="w-6 h-6 text-green-600 border-gray-400 rounded focus:ring-green-500" /></div>
                </div>
              ))}
              {fixedCosts.length === 0 && <div className="text-center text-gray-400 mt-10">固定費はまだ登録されていません</div>}
            </div>
            {fixedCosts.length > 0 && <div className="text-xs text-gray-400 text-right mt-2">※項目名をタップすると削除できます</div>}
          </div>
          {/* 🌟 合計エリアの名称を「未払い合計」に変更し分かりやすく */}
          <div className="bg-emerald-500 text-white px-4 py-3 mt-6 mb-4 flex justify-end items-center space-x-4 shrink-0 rounded-xl mx-2 shadow-md">
            <span className="font-bold text-sm">未払い合計</span><div className="w-32 h-8 border border-white rounded-md bg-transparent flex items-center justify-end px-2 font-bold">{totalAmount.toLocaleString()}</div>
          </div>
        </div>
      );
    };

    // ==========================================
    // 3. 変動タブ
    // ==========================================
    const VariableTab = ({ expenses, currentYearMonth, todayDay }) => {
      const days = Array.from({ length: 31 }, (_, i) => i + 1);
      
      const dailyExpenses = {};
      const monthlyVariableCosts = { electric: 0, gas: 0 };
      let totalSpent = 0;

      expenses.filter(e => e.yearMonth === currentYearMonth).forEach(e => {
        if (['外食', '自炊', '交通'].includes(e.category)) {
          if (!dailyExpenses[e.day]) dailyExpenses[e.day] = { out: 0, cook: 0, trans: 0 };
          if (e.category === '外食') dailyExpenses[e.day].out += e.amount;
          if (e.category === '自炊') dailyExpenses[e.day].cook += e.amount;
          if (e.category === '交通') dailyExpenses[e.day].trans += e.amount;
          totalSpent += e.amount;
        } else if (e.category === '電気') {
          monthlyVariableCosts.electric += e.amount;
        } else if (e.category === 'ガス') {
          monthlyVariableCosts.gas += e.amount;
        }
      });

      const budget = 40000; 
      const remaining = budget - totalSpent;
      const progressPercent = Math.min((totalSpent / budget) * 100, 100);

      const getProgressColor = () => {
        if (progressPercent >= 90) return 'bg-red-500';
        if (progressPercent >= 70) return 'bg-yellow-400';
        return 'bg-green-500';
      };

      return (
        <div className="flex flex-col h-full pt-2 pb-6">
          <div className="px-2 flex-1 overflow-y-auto">
            <div className="text-center font-bold text-gray-600 mb-2">{currentYearMonth}</div>
            <div className="grid grid-cols-7 gap-1 text-center text-xs font-bold text-gray-500 mb-1"><div className="text-red-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div className="text-blue-500">土</div></div>
            <div className="grid grid-cols-7 gap-1">
              {days.map(day => {
                const expense = dailyExpenses[day] || {};
                const isToday = day === todayDay;
                return (
                  <div key={day} className={`min-h-[4rem] border rounded-sm flex flex-col p-0.5 ${isToday ? 'bg-blue-50 border-blue-300' : 'bg-white border-gray-200'}`}>
                    <div className={`text-xs font-bold text-center ${isToday ? 'text-blue-600' : 'text-gray-700'}`}>{day}</div>
                    <div className="flex flex-col mt-auto space-y-[1px]">
                      {expense.out > 0 && <span className="text-[9px] text-blue-600 leading-tight bg-blue-50 rounded px-0.5 truncate">{expense.out}</span>}
                      {expense.cook > 0 && <span className="text-[9px] text-yellow-600 leading-tight bg-yellow-50 rounded px-0.5 truncate">{expense.cook}</span>}
                      {expense.trans > 0 && <span className="text-[9px] text-green-600 leading-tight bg-green-50 rounded px-0.5 truncate">{expense.trans}</span>}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* 🌟 上部に移動し、下部に余白（mb-8）を追加（要望8） */}
            <div className="bg-emerald-500 text-white px-4 py-3 mt-6 mb-8 flex flex-col space-y-3 shrink-0 rounded-xl shadow-md mx-1">
              <div>
                <div className="flex justify-between text-xs font-bold mb-1"><span>日々の変動費（残額: {remaining.toLocaleString()}円）</span><span>{totalSpent.toLocaleString()} / {budget.toLocaleString()}円</span></div>
                <div className="w-full h-3 bg-white/30 rounded-full overflow-hidden"><div className={`h-full transition-all duration-500 ${getProgressColor()}`} style={{ width: `${progressPercent}%` }}></div></div>
              </div>
              <hr className="border-white/30" />
              <div className="flex justify-between items-center text-sm font-bold">
                <div className="flex space-x-4"><span className="flex items-center"><span className="w-2 h-2 rounded-full bg-yellow-300 mr-1"></span>電気</span><span className="flex items-center"><span className="w-2 h-2 rounded-full bg-blue-300 mr-1"></span>ガス</span></div>
                <div className="flex space-x-3"><span>{monthlyVariableCosts.electric.toLocaleString()}円</span><span>{monthlyVariableCosts.gas.toLocaleString()}円</span></div>
              </div>
            </div>

          </div>
        </div>
      );
    };

    // ==========================================
    // 4. 累計タブ
    // ==========================================
    const TotalTab = ({ expenses }) => {
      const monthlyDataMap = {};
      expenses.forEach(e => {
        if (!monthlyDataMap[e.yearMonth]) {
          monthlyDataMap[e.yearMonth] = { month: e.yearMonth, food: { out: 0, cook: 0 }, utility: { electric: 0, gas: 0 }, transport: 0 };
        }
        if (e.category === '外食') monthlyDataMap[e.yearMonth].food.out += e.amount;
        if (e.category === '自炊') monthlyDataMap[e.yearMonth].food.cook += e.amount;
        if (e.category === '電気') monthlyDataMap[e.yearMonth].utility.electric += e.amount;
        if (e.category === 'ガス') monthlyDataMap[e.yearMonth].utility.gas += e.amount;
        if (e.category === '交通') monthlyDataMap[e.yearMonth].transport += e.amount;
      });

      const sortedMonths = Object.values(monthlyDataMap).sort((a, b) => b.month.localeCompare(a.month));

      return (
        <div className="flex flex-col h-full bg-gray-100 pt-4 pb-10 overflow-y-auto px-4 space-y-4">
          {sortedMonths.length === 0 && <div className="text-center text-gray-400 mt-10">変動費データがありません</div>}
          {sortedMonths.map((data, index) => {
            const foodTotal = data.food.out + data.food.cook;
            const utilityTotal = data.utility.electric + data.utility.gas;
            const total = foodTotal + utilityTotal + data.transport;
            return (
              <div key={index} className="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                <div className="flex justify-between items-end border-b border-gray-100 pb-2 mb-3"><h2 className="text-lg font-bold text-emerald-600">{data.month}</h2><div className="text-sm text-gray-500">変動費合計 <span className="text-lg font-bold text-gray-800 ml-1">{total.toLocaleString()}円</span></div></div>
                <div className="space-y-4">
                  <div>
                    <div className="flex justify-between items-center mb-1"><span className="text-sm font-bold text-gray-700 flex items-center"><span className="w-2 h-2 rounded-full bg-orange-400 mr-2"></span>食費</span><span className="text-sm font-bold">{foodTotal.toLocaleString()}円</span></div>
                    <div className="flex justify-between text-xs text-gray-500 pl-4"><span>外食: {data.food.out.toLocaleString()}円</span><span>自炊: {data.food.cook.toLocaleString()}円</span></div>
                  </div>
                  <div>
                    <div className="flex justify-between items-center mb-1"><span className="text-sm font-bold text-gray-700 flex items-center"><span className="w-2 h-2 rounded-full bg-blue-400 mr-2"></span>光熱費</span><span className="text-sm font-bold">{utilityTotal.toLocaleString()}円</span></div>
                    <div className="flex justify-between text-xs text-gray-500 pl-4"><span>電気: {data.utility.electric.toLocaleString()}円</span><span>ガス: {data.utility.gas.toLocaleString()}円</span></div>
                  </div>
                  <div>
                    <div className="flex justify-between items-center"><span className="text-sm font-bold text-gray-700 flex items-center"><span className="w-2 h-2 rounded-full bg-green-500 mr-2"></span>交通費</span><span className="text-sm font-bold">{data.transport.toLocaleString()}円</span></div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    };

    // ==========================================
    // 5. 入力タブ
    // ==========================================
    const InputTab = ({ handleAddData, currentYearMonth, todayDay, expenses, handleDeleteExpense }) => {
      const [amount, setAmount] = useState('');
      const [category, setCategory] = useState('');
      const [itemName, setItemName] = useState(''); 
      const [account, setAccount] = useState('');
      const [timing, setTiming] = useState('');
      const [day, setDay] = useState('');

      const categories = ['固定', '外食', '自炊', '交通', '電気', 'ガス'];
      const accounts = ['松', '新', 'か', 'P'];
      const timings = ['今日', '今月', '来月', '再来月', '毎月', '毎年', '偶月', '奇月'];
      const days = Array.from({ length: 31 }, (_, i) => i + 1).map(String).concat(['月末']);

      const isDayDisabled = timing === '今日';
      const isSubmitEnabled = amount !== '' && category !== '' && account !== '' && timing !== '' && (isDayDisabled || day !== '');

      const onSubmit = () => {
        if (!isSubmitEnabled) return;
        let targetDay = isDayDisabled ? todayDay : (day === '月末' ? 31 : Number(day));
        
        handleAddData({ amount: Number(amount), category, itemName, accountLabel: account, timing, day: targetDay, yearMonth: currentYearMonth });
        
        setAmount(''); setCategory(''); setItemName(''); setAccount(''); setTiming(''); setDay('');
      };

      const recentExpenses = [...expenses].reverse().slice(0, 5);

      return (
        <div className="flex flex-col h-full bg-white">
          <div className="px-4 py-4 shrink-0">
            <h2 className="text-lg font-bold text-gray-700 mb-2">支出</h2>
            <div className="flex items-center space-x-2"><input type="number" inputMode="numeric" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0" className="flex-1 h-12 text-2xl font-bold border border-gray-400 rounded-md px-3 text-right focus:outline-none focus:ring-2 focus:ring-emerald-500" /><span className="text-xl font-bold text-gray-700">円</span></div>
            {category === '固定' && (
              <div className="mt-4 animate-fade-in-down"><h2 className="text-sm font-bold text-gray-700 mb-1">項目名（家賃など）</h2><input type="text" value={itemName} onChange={(e) => setItemName(e.target.value)} placeholder="項目名を入力" className="w-full h-10 border border-gray-400 rounded-md px-3 focus:outline-none focus:ring-2 focus:ring-emerald-500" /></div>
            )}
          </div>
          {/* 🌟 横幅の圧迫を減らすため px-2 に変更（要望6） */}
          <div className="bg-emerald-500 flex-1 px-2 py-4 rounded-t-2xl flex flex-col overflow-y-auto shadow-inner">
            <div className="flex flex-wrap justify-center gap-1.5 mb-3">{categories.map((cat) => (<button key={cat} onClick={() => setCategory(cat)} className={`px-3 py-1.5 rounded-full text-sm font-bold transition-colors ${category === cat ? 'bg-white text-emerald-600 shadow' : 'bg-transparent text-white border border-white/50'}`}>{cat}</button>))}</div><hr className="border-white/30 mb-3 mx-2" />
            <div className="flex flex-wrap justify-center gap-2 mb-3">{accounts.map((acc) => (<button key={acc} onClick={() => setAccount(acc)} className={`w-10 h-10 rounded-full text-sm font-bold flex items-center justify-center transition-colors ${account === acc ? 'bg-white text-emerald-600 shadow' : 'bg-transparent text-white border border-white/50'}`}>{acc}</button>))}</div><hr className="border-white/30 mb-3 mx-2" />
            
            {/* 🌟 タイミングボタンをカプセル型（rounded-full）にし、文字サイズを調整（要望2・6） */}
            <div className="grid grid-cols-4 gap-1 mb-3 px-1">{timings.map((time) => (<button key={time} onClick={() => { setTiming(time); if (time === '今日') setDay(''); }} className={`py-1.5 rounded-full text-[11px] font-bold transition-colors ${timing === time ? 'bg-white text-emerald-600 shadow' : 'bg-transparent text-white border border-white/50'}`}>{time}</button>))}</div><hr className="border-white/30 mb-3 mx-2" />
            
            {/* 🌟 日付ボタンを完全な円形（w-9 h-9 rounded-full）に変更（要望3） */}
            <div className={`flex flex-wrap justify-center gap-1.5 px-1 transition-opacity ${isDayDisabled ? 'opacity-40 pointer-events-none' : 'opacity-100'}`}>
              {days.map((d) => (<button key={d} onClick={() => setDay(d)} className={`w-9 h-9 rounded-full text-xs font-bold flex items-center justify-center transition-colors ${day === d ? 'bg-white text-emerald-600 shadow' : 'bg-transparent text-white border border-white/40 hover:bg-white/20'}`}>{d}</button>))}
            </div>
            
            <div className="mt-6 pt-2 pb-2 px-2"><button onClick={onSubmit} disabled={!isSubmitEnabled} className={`w-full h-12 rounded-full font-bold text-lg shadow-md transition-all ${isSubmitEnabled ? 'bg-yellow-400 text-yellow-900 hover:bg-yellow-300' : 'bg-emerald-600 text-emerald-400 cursor-not-allowed shadow-none'}`}>この内容で登録する</button></div>

            <div className="mt-4 pb-8 px-2">
              <h3 className="text-sm font-bold text-white mb-2 border-b border-white/30 pb-1">最近の入力履歴（タップで取り消し）</h3>
              <div className="space-y-2">
                {recentExpenses.map(e => (
                  <div key={e.id} onClick={() => { if(window.confirm(`「${e.category} ${e.amount}円」を取り消しますか？`)) handleDeleteExpense(e.id); }} className="flex justify-between items-center bg-white/10 rounded px-3 py-2 text-white text-sm cursor-pointer active:bg-red-500/50 transition-colors">
                    <div className="flex items-center space-x-2">
                      <span className="bg-white text-emerald-600 px-2 py-0.5 rounded text-xs font-bold">{e.category}</span>
                      <span className="text-white/80 text-xs">{e.day}日</span>
                    </div>
                    <span className="font-bold">{e.amount.toLocaleString()}円</span>
                  </div>
                ))}
                {recentExpenses.length === 0 && <div className="text-white/70 text-sm">履歴はありません</div>}
              </div>
            </div>

          </div>
        </div>
      );
    };

    // ==========================================
    // 🚀 メインアプリケーション
    // ==========================================
    const App = () => {
      const [activeTab, setActiveTab] = useState('入力');

      const d = new Date();
      const currentYearMonth = `${d.getFullYear()}年${d.getMonth() + 1}月`;
      const todayDay = d.getDate();

      const [fixedCosts, setFixedCosts] = useLocalStorage('kakeibo_fixed', []);
      const [expenses, setExpenses] = useLocalStorage('kakeibo_expenses', []);

      const handleAddData = (data) => {
        const accountColors = {
          '松': 'bg-blue-700', '新': 'bg-yellow-400', 'か': 'bg-orange-500', 'P': 'bg-red-600',
          'IC': 'bg-green-500', 'W': 'bg-blue-400', '現': 'bg-gray-400'
        };
        const accColor = accountColors[data.accountLabel] || 'bg-gray-500';

        if (data.category === '固定') {
          setFixedCosts([...fixedCosts, { id: Date.now(), accountLabel: data.accountLabel, color: accColor, name: data.itemName || '未設定', date: data.day.toString(), amount: data.amount, isPaid: false }]);
        } else {
          setExpenses([...expenses, { id: Date.now(), amount: data.amount, category: data.category, day: data.day, yearMonth: data.yearMonth, accountLabel: data.accountLabel }]);
        }
      };

      const handleDeleteFixed = (id) => {
        setFixedCosts(fixedCosts.filter(cost => cost.id !== id));
      };

      const handleDeleteExpense = (id) => {
        setExpenses(expenses.filter(expense => expense.id !== id));
      };

      const tabs = ['資産', '固定', '変動', '累計', '入力'];
      const renderContent = () => {
        switch (activeTab) {
          case '資産': return <AssetTab fixedCosts={fixedCosts} expenses={expenses} currentYearMonth={currentYearMonth} />;
          case '固定': return <FixedTab fixedCosts={fixedCosts} setFixedCosts={setFixedCosts} handleDeleteFixed={handleDeleteFixed} currentYearMonth={currentYearMonth} />;
          case '変動': return <VariableTab expenses={expenses} currentYearMonth={currentYearMonth} todayDay={todayDay} />;
          case '累計': return <TotalTab expenses={expenses} />;
          case '入力': return <InputTab handleAddData={handleAddData} currentYearMonth={currentYearMonth} todayDay={todayDay} expenses={expenses} handleDeleteExpense={handleDeleteExpense} />;
          default: return <InputTab />;
        }
      };

      return (
        <div className="flex flex-col h-screen overflow-hidden">
          {/* 🌟 スクロールエリアの余白を適切に調整 */}
          <div className="flex-1 overflow-y-auto pb-24">
            {renderContent()}
          </div>
          {/* 🌟 ホームバー干渉回避のため safe-area-pb クラスを追加（要望1） */}
          <nav className="fixed bottom-0 w-full bg-white border-t border-gray-200 safe-area-pb shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
            <div className="flex justify-around items-center h-14">
              {tabs.map((tab) => (
                <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 h-full text-center text-sm font-bold transition-colors ${activeTab === tab ? 'text-emerald-600 border-t-2 border-emerald-600 pt-1' : 'text-gray-400 pt-1.5'}`}>{tab}</button>
              ))}
            </div>
          </nav>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
